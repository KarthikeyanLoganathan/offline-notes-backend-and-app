name: offline_notes_app
description: A comprehensive offline notes application with backend integration.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Networking
  dio: ^5.4.0
  
  # Local Storage & Database
  sqflite: ^2.3.0
  path: ^1.8.3
  shared_preferences: ^2.2.0
  
  # State Management
  provider: ^6.1.0
  
  # Utilities
  connectivity_plus: ^5.0.0
  workmanager: ^0.5.0
  intl: ^0.18.0
  uuid: ^4.0.0
  
  # UI/Icons
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
